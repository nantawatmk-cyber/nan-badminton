<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nan Badminton</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
margin:0;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

.price{
text-align:center;
color:green;
font-weight:bold;
margin-bottom:20px;
}

input,
select,
button{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:10px;
}

button{
background:#16a34a;
color:white;
font-size:16px;
border:none;
}

.courts{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.court{
padding:15px;
text-align:center;
border-radius:12px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.court.selected{
background:#2563eb;
}

.qr{
margin-top:20px;
text-align:center;
}

img{
max-width:250px;
}

</style>

</head>

<body>

<div class="container">

<h1>🏸 Nan Badminton</h1>

<div class="price">
200 บาท / ชั่วโมง
</div>

<input type="date" id="date">

<div class="courts">

<div class="court" onclick="selectCourt('A')" id="A">
Court A
</div>

<div class="court" onclick="selectCourt('B')" id="B">
Court B
</div>

<div class="court" onclick="selectCourt('C')" id="C">
Court C
</div>

<div class="court" onclick="selectCourt('D')" id="D">
Court D
</div>

</div>

<select id="time">

<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
<option>18:00</option>
<option>19:00</option>
<option>20:00</option>
<option>21:00</option>
<option>22:00</option>

</select>

<input
id="name"
placeholder="ชื่อผู้จอง">

<input
id="phone"
placeholder="เบอร์โทร">

<input
id="slip"
placeholder="ลิงก์สลิป Google Drive">

<div class="qr">

<img src="https://promptpay.io/0874410705/200">

</div>

<button onclick="bookCourt()">
ยืนยันการจอง
</button>

</div>

<script>
  
alert("JS Loaded");
  
let selectedCourt = "A";

function selectCourt(court){

selectedCourt = court;

document
.querySelectorAll(".court")
.forEach(c=>c.classList.remove("selected"));

document
.getElementById(court)
.classList.add("selected");

}

async function bookCourt(){

try{

const data = {
date: document.getElementById("date").value,
time: document.getElementById("time").value,
court: selectedCourt,
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
slipUrl: document.getElementById("slip").value
};

alert("กำลังส่งข้อมูล");

const res = await fetch(
"https://script.google.com/macros/s/AKfycbxsZbHGfdOk2umcJv-mRfaeigWgmQdG5MRxHu810onPhGnYZvT4aeCe8rMGwzXjHjQsxA/exec",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
}
);

const text = await res.text();

console.log(text);

alert("ส่งข้อมูลสำเร็จ");

}catch(err){

console.error(err);

alert("เกิดข้อผิดพลาด : " + err.message);

}

}


};

const res =
await fetch(
"https://script.google.com/macros/s/AKfycbxsZbHGfdOk2umcJv-mRfaeigWgmQdG5MRxHu810onPhGnYZvT4aeCe8rMGwzXjHjQsxA/exec",
{
method:"POST",
body:JSON.stringify(data)
});

const result =
await res.json();

if(result.success){

alert("จองสำเร็จ");

}else{

alert(result.message);

}

}

</script>

</body>
</html>
