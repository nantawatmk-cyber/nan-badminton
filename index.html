<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองสนามแบดมินตันอินเตอร์แอคทีฟ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .badminton-court {
            position: relative;
            border: 4px solid white;
            background-size: cover;
            transition: all 0.3s ease;
        }
        .badminton-court::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            border-top: 2px dashed rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 sm:p-8">

    <div class="max-w-5xl mx-auto bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-extrabold text-center text-yellow-400 mb-8 tracking-wide">🏸 NAN BADMINTON BOOKING</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-gray-700 p-4 rounded-xl space-y-4">
                    <h2 class="text-lg font-bold text-yellow-300 flex items-center">🔍 1. เลือกวันและเวลาที่ต้องการเล่น</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-300 mb-1">เลือกวันที่</label>
                            <input type="date" id="checkDate" class="w-full bg-gray-600 border border-gray-500 rounded-lg p-2 text-white focus:outline-none focus:border-yellow-400">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-300 mb-1">เลือกช่วงเวลา</label>
                            <select id="checkTime" class="w-full bg-gray-600 border border-gray-500 rounded-lg p-2 text-white focus:outline-none focus:border-yellow-400">
                                <option value="17:00 - 18:00">17:00 - 18:00 น.</option>
                                <option value="18:00 - 19:00">18:00 - 19:00 น.</option>
                                <option value="19:00 - 20:00">19:00 - 20:00 น.</option>
                                <option value="20:00 - 21:00">20:00 - 21:00 น.</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-md font-bold mb-3 text-gray-400">แผนผังสนามจำลอง (เปลี่ยนตามวัน/เวลาที่เลือกอัตโนมัติ)</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6" id="courtContainer">
                        
                        <div id="courtBtn1" class="badminton-court h-48 rounded-xl flex flex-col justify-center items-center shadow-lg transition duration-300">
                            <span class="text-2xl font-black text-white drop-shadow-md">สนาม 1</span>
                            <span id="courtStatus1" class="text-xs font-bold px-3 py-1 rounded-full mt-2 shadow bg-white text-gray-700">กำลังโหลด...</span>
                        </div>

                        <div id="courtBtn2" class="badminton-court h-48 rounded-xl flex flex-col justify-center items-center shadow-lg transition duration-300">
                            <span class="text-2xl font-black text-white drop-shadow-md">สนาม 2</span>
                            <span id="courtStatus2" class="text-xs font-bold px-3 py-1 rounded-full mt-2 shadow bg-white text-gray-700">กำลังโหลด...</span>
                        </div>

                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 bg-gray-700 p-6 rounded-xl border border-gray-600 h-fit">
                <div id="bookingFormWrapper">
                    <h2 class="text-lg font-bold text-yellow-300 mb-4">📝 2. กรอกข้อมูลการจอง</h2>
                    <form id="bookingForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-300">สนามที่เลือก</label>
                            <input type="text" id="selectedCourt" readonly required class="mt-1 block w-full bg-gray-800 border-none text-yellow-400 font-bold p-2.5 rounded-lg text-center" placeholder="-- กรุณาคลิกเลือกรูปสนามฝั่งซ้าย --">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-300">ชื่อผู้จอง</label>
                            <input type="text" id="userName" required class="mt-1 block w-full bg-gray-600 border border-gray-500 p-2 rounded-lg text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-300">เบอร์โทรศัพท์</label>
                            <input type="tel" id="userPhone" required class="mt-1 block w-full bg-gray-600 border border-gray-500 p-2 rounded-lg text-white">
                        </div>
                        
                        <button type="submit" id="submitBtn" disabled class="w-full bg-gray-500 text-gray-300 cursor-not-allowed p-3 rounded-lg font-bold text-sm transition mt-2">
                            กรุณาเลือกสนามก่อน
                        </button>
                    </form>
                </div>

                <div id="successCard" class="hidden text-center py-6">
                    <div class="inline-flex p-3 bg-green-500 text-white rounded-full mb-3 shadow-lg">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-green-400 mb-4">การจองของคุณสำเร็จแล้ว!</h3>
                    <div class="bg-gray-800 p-4 rounded-xl text-left text-sm space-y-2 border border-gray-600 text-gray-300">
                        <p><strong>ผู้จอง:</strong> <span id="sumName"></span></p>
                        <p><strong>วัน/เวลา:</strong> <span id="sumDateTime" class="text-yellow-400 font-semibold"></span></p>
                        <p><strong>สนาม:</strong> <span id="sumCourt" class="text-green-400 font-semibold"></span></p>
                    </div>
                    <button onclick="resetApp()" class="w-full bg-yellow-500 text-gray-900 p-2.5 rounded-lg font-bold text-sm hover:bg-yellow-400 mt-4 shadow-md">
                        จองเพิ่มอีกครั้ง
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ⚠️ เอา Web App URL จาก Google Apps Script ของคุณมาใส่ตรงนี้แทนข้อความข้างล่างนะครับ
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw8kHAkNaTf06HYDCyR6R1iJIiayH0RNiyS2hgg-Qm2qLkFCo3upSvFUoYstj3Wgvy5Ow/exec";
        let globalBookedSlots = [];

        // 1. ฟังก์ชันดึงสถานะสนาม
        function loadCourtStatus() {
            const dateInput = document.getElementById('checkDate');
            const timeInput = document.getElementById('checkTime');
            if (!dateInput || !timeInput) return;

            const date = dateInput.value;
            const time = timeInput.value;
            
            cancelCourtSelection();

            fetch(`${WEB_APP_URL}?date=${date}`)
            .then(res => res.json())
            .then(bookedSlots => {
                globalBookedSlots = bookedSlots; 
                
                const isCourt1Booked = bookedSlots.some(b => b.time === time && b.court === "สนาม 1");
                const isCourt2Booked = bookedSlots.some(b => b.time === time && b.court === "สนาม 2");

                updateCourtUI(1, isCourt1Booked);
                updateCourtUI(2, isCourt2Booked);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('courtStatus1').innerText = "โหลดผิดพลาด";
                document.getElementById('courtStatus2').innerText = "โหลดผิดพลาด";
            });
        }

        // 2. ปรับเปลี่ยนสีสนามตามความว่าง/เต็ม
        function updateCourtUI(courtNum, isBooked) {
            const btn = document.getElementById(`courtBtn${courtNum}`);
            const statusText = document.getElementById(`courtStatus${courtNum}`);
            if(!btn || !statusText) return;

            if (isBooked) {
                btn.className = "badminton-court bg-red-600 h-48 rounded-xl flex flex-col justify-center items-center shadow-lg opacity-60 cursor-not-allowed";
                statusText.className = "text-xs bg-red-900 text-white font-bold px-3 py-1 rounded-full mt-2";
                statusText.innerText = "❌ เต็มแล้ว (จองซ้ำไม่ได้)";
                btn.onclick = null; 
            } else {
                btn.className = "badminton-court bg-green-600 hover:bg-green-500 cursor-pointer h-48 rounded-xl flex flex-col justify-center items-center shadow-lg transform hover:scale-105";
                statusText.className = "text-xs bg-white text-green-700 font-bold px-3 py-1 rounded-full mt-2 shadow";
                statusText.innerText = "🟢 ว่าง (คลิกเลือกจอง)";
                btn.onclick = function() { selectCourt(`สนาม ${courtNum}`); };
            }
        }

        // 3. ฟังก์ชันการคลิกเลือกสนาม
        function selectCourt(courtName) {
            document.getElementById('selectedCourt').value = courtName;
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.className = "w-full bg-yellow-500 text-gray-900 hover:bg-yellow-400 p-3 rounded-lg font-extrabold text-sm transition shadow-md mt-2 cursor-pointer";
            submitBtn.innerText = `ยืนยันการจอง ${courtName}`;

            const num = courtName === "สนาม 1" ? 1 : 2;
            const otherNum = num === 1 ? 2 : 1;
            
            const courtActive = document.getElementById(`courtBtn${num}`);
            if(courtActive) courtActive.classList.add('ring-4', 'ring-yellow-400');
            
            const courtInactive = document.getElementById(`courtBtn${otherNum}`);
            if(courtInactive) courtInactive.classList.remove('ring-4', 'ring-yellow-400');
        }

        // 4. รีเซ็ตหน้าฟอร์มชั่วคราว
        function cancelCourtSelection() {
            document.getElementById('selectedCourt').value = "";
            const submitBtn = document.getElementById('submitBtn');
            if(submitBtn) {
                submitBtn.disabled = true;
                submitBtn.className = "w-full bg-gray-500 text-gray-300 cursor-not-allowed p-3 rounded-lg font-bold text-sm mt-2";
                submitBtn.innerText = "กรุณาเลือกสนามก่อน";
            }
            
            const c1 = document.getElementById(`courtBtn1`);
            const c2 = document.getElementById(`courtBtn2`);
            if(c1) c1.classList.remove('ring-4', 'ring-yellow-400');
            if(c2) c2.classList.remove('ring-4', 'ring-yellow-400');
        }

        // 5. ส่งคำขอจองไปที่ Google Sheets 
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const date = document.getElementById('checkDate').value;
            const time = document.getElementById('checkTime').value;
            const court = document.getElementById('selectedCourt').value;
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;

            const doubleCheck = globalBookedSlots.some(b => b.time === time && b.court === court);
            if (doubleCheck) {
                alert('💥 จองซ้ำซ้อน! มีคนอื่นเพิ่งกดจองสนามนี้ในเวลาเดียวกันตัดหน้าคุณไปเมื่อครู่นี้เอง ระบบกำลังอัปเดตสถานะสนามใหม่ครับ');
                loadCourtStatus();
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "กำลังบันทึกข้อมูล...";

            const bookingData = { name, phone, date, court, time };

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            })
            .then(() => {
                document.getElementById('sumName').innerText = name;
                document.getElementById('sumDateTime').innerText = `${date} (${time} น.)`;
                document.getElementById('sumCourt').innerText = court;

                document.getElementById('bookingFormWrapper').classList.add('hidden');
                document.getElementById('successCard').classList.remove('hidden');
                loadCourtStatus(); 
            })
            .catch(error => {
                console.error(error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย');
            });
        });

        function resetApp() {
            document.getElementById('successCard').classList.add('hidden');
            document.getElementById('bookingFormWrapper').classList.remove('hidden');
            document.getElementById('bookingForm').reset();
            loadCourtStatus();
        }

        // --- 6. ผูกฟังก์ชัน event listener ผ่าน JavaScript ทั้งหมดเมื่อเว็บพร้อม ---
        window.addEventListener('DOMContentLoaded', (event) => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('checkDate').value = today;

            // สั่งให้ดักจับการเปลี่ยนค่า (onchange) ผ่านตรงนี้แทน HTML ดั้งเดิมเพื่อความปลอดภัย
            document.getElementById('checkDate').addEventListener('change', loadCourtStatus);
            document.getElementById('checkTime').addEventListener('change', loadCourtStatus);

            // รันครั้งแรกทันทีที่เปิดหน้าเว็บ
            loadCourtStatus();
        });
    </script>
</body>
</html>
