<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองสนามแบดมินตัน</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-3 sm:p-5">

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
        
        <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-md">
            <h3 class="text-xl font-bold mb-4 text-gray-800 flex items-center justify-between">
                <span>ตารางสถานะสนามวันนี้</span>
                <input type="date" id="checkDate" class="text-sm p-1 border rounded-md font-normal" onchange="loadCurrentBookings()">
            </h3>
            
            <div class="flex space-x-4 mb-4 text-xs font-semibold">
                <span class="flex items-center"><span class="w-3 h-3 bg-green-500 rounded-full mr-1"></span> ว่าง</span>
                <span class="flex items-center"><span class="w-3 h-3 bg-red-500 rounded-full mr-1"></span> ไม่ว่าง (มีคนจองแล้ว)</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-center border-collapse text-sm">
                    <thead>
                        <tr class="bg-gray-200">
                            <th class="p-2 border">เวลา</th>
                            <th class="p-2 border">สนาม 1</th>
                            <th class="p-2 border">สนาม 2</th>
                        </tr>
                    </thead>
                    <tbody id="statusTableBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <div id="bookingCard">
                <h2 class="text-xl font-bold mb-4 text-blue-600">กรอกข้อมูลการจอง</h2>
                <form id="bookingForm" class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-700">ชื่อผู้จอง</label>
                        <input type="text" id="userName" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700">เบอร์โทรศัพท์</label>
                        <input type="tel" id="userPhone" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700">วันที่ต้องการเล่น</label>
                        <input type="date" id="bookingDate" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" onchange="syncDate(this.value)">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700">เลือกสนาม</label>
                        <select id="courtNumber" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                            <option value="สนาม 1">สนาม 1</option>
                            <option value="สนาม 2">สนาม 2</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700">เวลา</label>
                        <select id="bookingTime" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                            <option value="17:00 - 18:00">17:00 - 18:00</option>
                            <option value="18:00 - 19:00">18:00 - 19:00</option>
                            <option value="19:00 - 20:00">19:00 - 20:00</option>
                            <option value="20:00 - 21:00">20:00 - 21:00</option>
                        </select>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 font-semibold mt-2 text-sm">ยืนยันการจอง</button>
                </form>
            </div>

            <div id="successCard" class="hidden text-center py-6">
                <div class="inline-flex p-2 bg-green-100 text-green-600 rounded-full mb-2">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-lg font-bold text-gray-800">จองสำเร็จแล้ว!</h3>
                <div class="bg-gray-50 p-3 rounded-md text-left text-xs space-y-1 my-3 border text-gray-600">
                    <p><strong>ผู้จอง:</strong> <span id="summaryName"></span></p>
                    <p><strong>วันที่:</strong> <span id="summaryDate"></span></p>
                    <p><strong>สนาม:</strong> <span id="summaryCourt"></span></p>
                    <p><strong>เวลา:</strong> <span id="summaryTime"></span></p>
                </div>
                <button onclick="backToBooking()" class="w-full bg-gray-600 text-white p-2 rounded-md hover:bg-gray-700 text-xs font-semibold">กลับไปหน้าจอง</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ เอา Web App URL ตัวใหม่จาก Google Apps Script มาใส่ตรงนี้ครับ
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzvOqo6vFNizm47nhg0ieu7OqSTuBwylwyMnwV9SC9MX9SfhTCta3b6u57_YK56BO81lg/exec";
        
        // ช่วงเวลาทั้งหมดที่เปิดให้บริการของสนามคุณ
        const TIME_SLOTS = ["17:00 - 18:00", "18:00 - 19:00", "19:00 - 20:00", "20:00 - 21:00"];

        // ตั้งค่าวันที่เริ่มต้นให้เป็นวันปัจจุบันอัตโนมัติ
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('checkDate').value = today;
            document.getElementById('bookingDate').value = today;
            loadCurrentBookings();
        };

        function syncDate(val) {
            document.getElementById('checkDate').value = val;
            loadCurrentBookings();
        }

        // ฟังก์ชันดึงข้อมูลจาก Google Sheets มาแสดงผลที่ตาราง
        function loadCurrentBookings() {
            const selectedDate = document.getElementById('checkDate').value;
            const tableBody = document.getElementById('statusTableBody');
            tableBody.innerHTML = `<tr><td colspan="3" class="p-4 text-gray-500">กำลังดึงข้อมูลสถานะสนาม...</td></tr>`;

            fetch(`${WEB_APP_URL}?date=${selectedDate}`)
            .then(res => res.json())
            .then(bookedSlots => {
                tableBody.innerHTML = ""; // เคลียร์ตารางเดิม
                
                TIME_SLOTS.forEach(time => {
                    // ตรวจสอบว่ามีคนจองสนาม 1 หรือ สนาม 2 ในเวลานี้ไปหรือยัง
                    const isCourt1Booked = bookedSlots.some(b => b.time === time && b.court === "สนาม 1");
                    const isCourt2Booked = bookedSlots.some(b => b.time === time && b.court === "สนาม 2");

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="p-3 border font-medium bg-gray-50">${time}</td>
                        <td class="p-3 border text-white font-semibold ${isCourt1Booked ? 'bg-red-500' : 'bg-green-500'}">
                            ${isCourt1Booked ? 'เต็ม' : 'ว่าง'}
                        </td>
                        <td class="p-3 border text-white font-semibold ${isCourt2Booked ? 'bg-red-500' : 'bg-green-500'}">
                            ${isCourt2Booked ? 'เต็ม' : 'ว่าง'}
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error(err);
                tableBody.innerHTML = `<tr><td colspan="3" class="p-4 text-red-500">ไม่สามารถโหลดข้อมูลได้ หรือ ลิงก์เบื้องหลังไม่ถูกต้อง</td></tr>`;
            });
        }

        // ระบบส่งฟอร์มจอง
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "กำลังจอง...";

            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const date = document.getElementById('bookingDate').value;
            const court = document.getElementById('courtNumber').value;
            const time = document.getElementById('bookingTime').value;

            const bookingData = { name, phone, date, court, time };

            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(bookingData)
            })
            .then(() => {
                document.getElementById('summaryName').innerText = name;
                document.getElementById('summaryDate').innerText = date;
                document.getElementById('summaryCourt').innerText = court;
                document.getElementById('summaryTime').innerText = time;

                document.getElementById('bookingCard').classList.add('hidden');
                document.getElementById('successCard').classList.remove('hidden');
                
                document.getElementById('bookingForm').reset();
                loadCurrentBookings(); // อัปเดตตารางให้เป็นสีแดงทันที
            })
            .catch(error => {
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูล');
                console.error(error);
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "ยืนยันการจอง";
            });
        });

        function backToBooking() {
            document.getElementById('successCard').classList.add('hidden');
            document.getElementById('bookingCard').classList.remove('hidden');
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('bookingDate').value = today;
        }
    </script>
</body>
</html>
