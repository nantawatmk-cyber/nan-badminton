<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nan Badminton</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:600px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
}

button{
background:#16a34a;
color:white;
border:none;
cursor:pointer;
}

.courts{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.court{
background:#22c55e;
color:white;
padding:15px;
text-align:center;
cursor:pointer;
border-radius:10px;
}

.selected{
background:#2563eb;
}
</style>

</head>

<body>

<div class="card">

<h2>🏸 Nan Badminton</h2>

<p>ราคา 200 บาท / ชั่วโมง</p>

<input type="date" id="date">

<div class="courts">
<div class="court selected" id="A">Court A</div>
<div class="court" id="B">Court B</div>
<div class="court" id="C">Court C</div>
<div class="court" id="D">Court D</div>
</div>

<select id="time">
<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
<option>18:00</option>
<option>19:00</option>
<option>20:00</option>
<option>21:00</option>
<option>22:00</option>
</select>

<input id="name" placeholder="ชื่อผู้จอง">
<input id="phone" placeholder="เบอร์โทร">
<input id="slip" placeholder="ลิงก์สลิป Google Drive">

<button id="bookBtn">ยืนยันการจอง</button>

</div>

<script>

let selectedCourt = "A";

document.querySelectorAll(".court").forEach(el => {

el.addEventListener("click", () => {

document.querySelectorAll(".court")
.forEach(x => x.classList.remove("selected"));

el.classList.add("selected");

selectedCourt = el.id;

});

});

document.getElementById("bookBtn")
.addEventListener("click", async () => {

const data = {
date: document.getElementById("date").value,
time: document.getElementById("time").value,
court: selectedCourt,
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
slipUrl: document.getElementById("slip").value
};

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbxsZbHGfdOk2umcJv-mRfaeigWgmQdG5MRxHu810onPhGnYZvT4aeCe8rMGwzXjHjQsxA/exec",
{
method:"POST",
body: JSON.stringify(data)
}
);

const text = await response.text();

console.log(text);

alert("ส่งข้อมูลเรียบร้อย");

}catch(error){

console.error(error);

alert("เกิดข้อผิดพลาด : " + error.message);

}

});

</script>

</body>
</html>
